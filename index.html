<meta charset="utf-8">
<title>PSL Quote Builder — TIS-LED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#0B0E12; --orange:#E8651E; --logo-orange:#F56600;
    --text:#3a434e; --head:#0A0A0A; --muted:#8a939d; --rule:#D8DDE2;
    --hair:#eceff2; --cream:#FDF3EC; --darkgray:#8B95A4;
    --chakra:'Chakra Petch',sans-serif; --barlow:'Barlow',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#5a6470;font-family:var(--barlow);padding:0 0 60px}

  /* ---------- toolbar ---------- */
  .bar{position:sticky;top:0;z-index:50;background:var(--ink);border-bottom:2px solid var(--orange);
    padding:10px 18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .bar .ttl{font-family:var(--chakra);font-weight:700;color:#fff;font-size:14px;letter-spacing:.04em;margin-right:4px}
  .bar .ttl span{color:var(--orange)}
  .seg{display:flex;background:#171d25;border-radius:6px;overflow:hidden;border:1px solid #2a333f}
  .seg button{font-family:var(--chakra);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    background:transparent;color:#8B95A4;border:0;padding:7px 13px;cursor:pointer}
  .seg button[aria-pressed=true]{background:var(--orange);color:#fff}
  .segl{font-family:var(--chakra);font-weight:600;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:#5c6673;padding:8px 9px 7px;border-right:1px solid #2a333f;background:#11161d}
  .seg button:focus-visible{outline:2px solid #fff;outline-offset:-2px}
  .btn{font-family:var(--chakra);font-weight:600;font-size:11px;letter-spacing:.09em;text-transform:uppercase;
    background:#171d25;color:#c9d2dc;border:1px solid #2a333f;border-radius:6px;padding:7px 13px;cursor:pointer}
  .btn:hover{border-color:var(--orange);color:#fff}
  .btn.pri{background:var(--orange);border-color:var(--orange);color:#fff}
  .btn:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .hint{color:#8B95A4;font-size:11px;margin-left:auto;font-family:var(--chakra);letter-spacing:.04em}
  .who{font-family:var(--chakra);font-weight:600;font-size:11px;letter-spacing:.06em;background:#171d25;
    color:#fff;border:1px solid #2a333f;border-radius:6px;padding:7px 11px;width:150px}
  .who::placeholder{color:#5c6673;font-weight:400;letter-spacing:.09em;text-transform:uppercase}
  .who:focus{outline:0;border-color:var(--orange)}
  .who.need{border-color:var(--orange);background:#2a1a10}

  /* ---------- page ---------- */
  .sheet{width:8.5in;min-height:11in;background:#fff;margin:24px auto;position:relative;
    box-shadow:0 8px 40px rgba(0,0,0,.35);display:flex;flex-direction:column}
  .band{background:var(--ink);padding:14px 40px 12px;display:flex;justify-content:space-between;align-items:flex-start}
  .brandwrap{display:flex;align-items:center;gap:14px}
  .wm{font-family:var(--chakra);font-weight:700;font-size:27pt;color:#fff;line-height:1;letter-spacing:.02em;white-space:nowrap}
  .bywrap{display:flex;align-items:center;gap:8px;border-left:1px solid #2f3945;padding-left:14px}
  .by{font-family:var(--chakra);font-size:8pt;color:var(--darkgray);letter-spacing:.1em}
  .psllogo img{height:30px;width:auto;display:block}
  .kick{font-family:var(--chakra);font-size:8pt;color:#FF8A3C;letter-spacing:.22em;text-transform:uppercase;margin-top:7px}
  .doctitle{font-family:var(--chakra);font-size:8pt;color:var(--darkgray);letter-spacing:.18em;
    text-transform:uppercase;text-align:right;line-height:1.7}
  .doctitle b{color:#fff;font-weight:600}
  .doctitle .qno{color:var(--orange);font-weight:600}
  .familybar{background:var(--cream);padding:4px 40px;display:flex;justify-content:space-between;
    font-family:var(--chakra);font-size:7pt;letter-spacing:.14em;text-transform:uppercase}
  .familybar .l{color:var(--orange);font-weight:600}
  .familybar .r{color:var(--muted)}
  .body{padding:14px 40px 0;flex:1}
  .foot{margin:12px 40px 0;padding:8px 0 14px;border-top:1px solid var(--rule);display:flex;
    justify-content:space-between;gap:24px;font-size:7.2pt;color:var(--muted);line-height:1.5}
  .foot .brand{font-family:var(--chakra);text-align:right;white-space:nowrap}
  .footlogo img{height:16px;vertical-align:-3px}

  /* ---------- document blocks ---------- */
  .proj{border-left:3px solid var(--orange);padding-left:14px;margin-bottom:12px}
  .proj h1{font-family:var(--chakra);font-weight:700;font-size:19pt;color:var(--head);line-height:1.1}
  .proj .meta{font-family:var(--chakra);font-weight:600;font-size:10pt;color:var(--orange);letter-spacing:.04em;margin-top:3px}
  .wedge{border-left:3px solid var(--orange);padding-left:14px;margin-bottom:12px}
  .wedge h2{font-family:var(--chakra);font-weight:600;font-size:12.5pt;color:var(--head);line-height:1.15}
  .wedge h2 em{color:var(--orange);font-style:normal}
  .lead{font-size:7.8pt;color:var(--text);line-height:1.4;margin-top:5px}
  .lead b{color:var(--head)}
  .seclbl{display:flex;align-items:center;gap:9px;margin:14px 0 4px}
  .seclbl .t{font-family:var(--chakra);font-weight:600;font-size:8.5pt;letter-spacing:.2em;
    text-transform:uppercase;color:var(--head);white-space:nowrap}
  .seclbl .ln{flex:1;height:1px;background:var(--rule)}
  .seclbl .n{font-family:var(--chakra);font-size:7pt;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

  table.price{width:100%;border-collapse:collapse;font-size:9pt}
  table.price td{padding:5px 8px;border-bottom:1px solid var(--hair);color:var(--head);vertical-align:middle}
  table.price td.n{font-family:var(--chakra);font-weight:600}
  table.price td.v{text-align:right;font-family:var(--chakra);font-weight:700;white-space:nowrap;width:150px}
  table.price td.x{width:26px;text-align:center}
  table.price tr.sub td{border-top:1.5px solid var(--rule);border-bottom:none;padding-top:7px;color:var(--muted);font-size:8.4pt}
  table.price tr.sub td.v{color:var(--head)}
  table.price tr.add td{border-bottom:none;padding:2.5px 8px;font-size:8.4pt;color:var(--text)}
  table.price tr.add td.n{font-weight:500}
  table.price tr.add td.v{font-weight:600}
  .ratebox{color:var(--orange);font-weight:700}
  .ratebox [contenteditable]{display:inline-block;min-width:22px;text-align:right}
  .addrow{display:flex;gap:6px;flex-wrap:wrap}
  table.price tr.tot td{border-top:2px solid var(--head);border-bottom:none;padding-top:8px;font-size:11pt}
  table.price tr.tot td.v{color:var(--orange)}
  .pricenote{font-size:7.2pt;color:var(--muted);margin-top:5px;line-height:1.4}

  .scols{display:flex;gap:24px}
  .scol{flex:1;min-width:0}
  ul.slist{list-style:none}
  ul.slist li{position:relative;padding-left:13px;font-size:7.8pt;color:var(--text);line-height:1.42;margin-bottom:3px}
  ul.slist li:before{content:'';position:absolute;left:0;top:5px;width:5px;height:5px;background:var(--orange);border-radius:50%}
  ul.slist li.sub{padding-left:24px;color:#6b747e;font-size:7.4pt}
  ul.slist li.sub:before{left:13px;width:4px;height:4px;background:#c2cbd3}
  ul.slist.ex li:before{background:#c2cbd3}
  .callout{background:var(--cream);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;
    padding:8px 13px;margin-top:12px;font-size:7.8pt;color:var(--text);line-height:1.45}
  .callout b{color:var(--head)}
  .tnote{font-size:7.6pt;color:var(--text);line-height:1.45}
  .tnote b{color:var(--head)}

  /* ---------- editing affordances ---------- */
  [contenteditable]{outline:0}
  [contenteditable]:hover{background:#fff6f0;border-radius:3px;box-shadow:0 0 0 3px #fff6f0}
  [contenteditable]:focus{background:#fff1e7;border-radius:3px;box-shadow:0 0 0 3px #fff1e7}
  [contenteditable]:empty:before{content:attr(data-ph);color:#c2cbd3}
  .kill{background:none;border:0;color:#d8dde2;cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;font-family:var(--barlow)}
  .kill:hover{color:var(--orange)}
  .additem{font-family:var(--chakra);font-weight:600;font-size:7pt;letter-spacing:.12em;text-transform:uppercase;
    background:none;border:1px dashed var(--rule);border-radius:4px;color:var(--muted);padding:3px 9px;cursor:pointer;margin-top:5px}
  .additem:hover{border-color:var(--orange);color:var(--orange)}

  /* ---------- quote log ---------- */
  .log{width:8.5in;margin:24px auto;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.35);padding:0 0 30px}
  .loghead{background:var(--ink);padding:16px 40px;display:flex;justify-content:space-between;align-items:center}
  .loghead h2{font-family:var(--chakra);font-weight:700;font-size:20pt;color:#fff}
  .loghead .sub{font-family:var(--chakra);font-size:8pt;color:var(--darkgray);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
  .logwrap{padding:0 40px}
  table.log{width:100%;border-collapse:collapse;font-size:8.4pt;margin-top:16px}
  table.log th{font-family:var(--chakra);font-weight:600;text-align:left;font-size:7pt;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);padding:0 8px 6px;border-bottom:1.5px solid var(--head)}
  table.log td{padding:6px 8px;border-bottom:1px solid var(--hair);color:var(--text);vertical-align:top}
  table.log td.no{font-family:var(--chakra);font-weight:700;color:var(--head);white-space:nowrap}
  table.log td.v{text-align:right;font-family:var(--chakra);font-weight:600;color:var(--head);white-space:nowrap}
  table.log tr:hover td{background:#fff6f0}
  .pill{display:inline-block;font-family:var(--chakra);font-weight:600;font-size:6.6pt;letter-spacing:.1em;
    text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--cream);color:var(--orange);white-space:nowrap}
  .empty{padding:50px 40px;text-align:center;color:var(--muted);font-size:9pt}
  .logstats{display:flex;gap:18px;padding:16px 40px 0}
  .lst{flex:1;border-top:2px solid var(--orange);padding-top:9px}
  .lstn{font-family:var(--chakra);font-weight:700;font-size:18pt;color:var(--head);line-height:1}
  .lstl{font-size:7.2pt;color:var(--muted);margin-top:3px}
  .warn{background:#FDF3EC;border-left:3px solid var(--orange);margin:16px 40px 0;padding:9px 13px;
    font-size:8pt;color:var(--text);line-height:1.45;border-radius:0 6px 6px 0}
  .warn b{color:var(--head)}

  /* ---------- export ---------- */
  body.exporting .kill, body.exporting .additem, body.exporting .addrow{display:none !important}
  body.exporting [contenteditable]:hover, body.exporting [contenteditable]:focus{background:none !important;box-shadow:none !important}
  body.exporting [contenteditable]:empty:before{content:'' !important}
  .btn[disabled]{opacity:.55;cursor:default}

  /* ---------- print ---------- */
  @page{size:Letter;margin:0}
  @media print{
    html,body{background:#fff;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .band,.familybar,.callout,.seg,.doctitle .qno{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .bar,.kill,.additem,.hint{display:none !important}
    .sheet{box-shadow:none;margin:0;width:8.5in;height:auto;min-height:0;page-break-after:auto;page-break-inside:auto}
    .scols{page-break-inside:auto}
    .scol{page-break-inside:auto}
    ul.slist li{page-break-inside:avoid}
    .band{page-break-after:avoid}
    .callout{page-break-inside:avoid}
    [contenteditable]:hover,[contenteditable]:focus{background:none;box-shadow:none}
    .foot{margin-top:auto}
  }
  @media (max-width:900px){ .sheet{transform-origin:top left} }
</style>

<div class="bar">
  <div class="ttl">PSL Quote Builder <span>· TIS-LED™</span></div>
  <div class="seg" role="group" aria-label="View">
    <button data-view="build" aria-pressed="true">Build</button>
    <button data-view="log" aria-pressed="false">Quote log</button>
  </div>
  <div class="seg" role="group" aria-label="Scope type">
    <button data-scope="pia" aria-pressed="true">Pole In Air</button>
    <button data-scope="turnkey" aria-pressed="false">Turnkey</button>
    <button data-scope="retrofit" aria-pressed="false">Retrofit</button>
  </div>
  <div class="seg" role="group" aria-label="Service voltage" id="voltseg">
    <span class="segl">Service</span>
    <button data-volt="120/240" aria-pressed="false">120/240</button>
    <button data-volt="120/208" aria-pressed="false">120/208</button>
    <button data-volt="277/480" aria-pressed="true">277/480</button>
  </div>
  <button class="btn" id="addline">+ Price line</button>
  <button class="btn" id="newquote">New quote</button>
  <button class="btn pri" id="print">Download PDF</button>
  <input class="who" id="whoami" type="text" placeholder="Your name" aria-label="Your name — stamped on every quote you issue" autocomplete="off">
  <div class="hint" id="hint">Click any text to edit · quote number is assigned on download</div>
</div>

<div id="doc"></div>

/* Quotes are dated the day they are written, so default it rather than making
   someone type it. MM.DD.YYYY to match the PSL master bid. */
function todayStr(){
  const d = new Date(), p = n => String(n).padStart(2,"0");
  return `${p(d.getMonth()+1)}.${p(d.getDate())}.${d.getFullYear()}`;
}

/* ---------- quote numbering ----------
   PSL-MMDDYY-XYZ-NN
     MMDDYY  date the quote is issued
     XYZ     initials of the project name, one letter per significant word
     NN      sequence for that project on that date, so a re-quote reads -02
   The number is assigned on download, never on load, so drafts never consume one. */
const pad = (n,w) => String(n).padStart(w,"0");
function dayKey(d){ return `${pad(d.getMonth()+1,2)}${pad(d.getDate(),2)}${String(d.getFullYear()).slice(2)}`; }

/* Skip the words nobody says out loud: "University School of Nashville" is USN, not USON. */
const SKIP = new Set(["of","and","the","at","in","on","for","to","a","an","&","w/"]);
function initials(name){
  const words = String(name||"")
    .replace(/[\u2013\u2014]/g," ")
    .split(/[\s\-\/]+/)
    .map(w => w.replace(/[^A-Za-z0-9]/g,""))
    .filter(w => w.length && !SKIP.has(w.toLowerCase()));
  return words.map(w => w[0].toUpperCase()).join("").slice(0,5);
}

/* ---------- shared quote registry ----------
   Every issued quote is appended to one shared record, visible to everyone using
   this tool. That makes the numbering company-wide rather than per-browser: two
   people quoting the same project on the same day get -01 and -02, not two -01s.
   NOTE: shared:true means everyone with this tool sees this log. It is a team
   register, not a security boundary. */
/* ---------- storage adapter ----------
   Three environments, three backends, one API:
     window.storage  Claude artifact — genuinely shared across users
     localStorage    GitHub Pages / local file — persists, but PER BROWSER
     memory          nothing available — this session only
   The tool reports which one it got rather than pretending they are equivalent. */
let storeMode = "memory";     // shared | local | memory
const mem = {};
const store = {
  async get(k, shared){
    if(typeof window !== "undefined" && window.storage){
      try{ const r = await window.storage.get(k, !!shared); storeMode = "shared"; return r && r.value != null ? r.value : null; }
      catch(e){ storeMode = "shared"; return null; }
    }
    try{ const v = localStorage.getItem(k); storeMode = "local"; return v; }catch(e){}
    storeMode = "memory"; return k in mem ? mem[k] : null;
  },
  async set(k, v, shared){
    if(typeof window !== "undefined" && window.storage){
      try{ await window.storage.set(k, v, !!shared); storeMode = "shared"; return true; }catch(e){}
    }
    try{ localStorage.setItem(k, v); storeMode = "local"; return true; }catch(e){}
    mem[k] = v; storeMode = "memory"; return true;
  }
};

const REG_KEY = "psl:quotes:v1";
let registry = [];        // [{no, day, ini, project, city, scope, volt, total, user, ts}]
let regReady = false;
let regShared = true;     // false once we fall back to this-browser-only

async function loadRegistry(){
  const raw = await store.get(REG_KEY, true);
  try{ registry = raw ? JSON.parse(raw) : []; }catch(e){ registry = []; }
  regShared = (storeMode === "shared");
  regReady = true;
}
async function saveRegistry(){
  return await store.set(REG_KEY, JSON.stringify(registry), true);
}

/* Next sequence is derived from the registry itself — one source of truth,
   so the number can never disagree with the log. */
function seqFor(day, ini){
  return registry.filter(q => q.day === day && q.ini === ini).length + 1;
}
async function issueQuote(name, city, scopeKey, voltKey, total){
  await loadRegistry();                       // re-read: someone else may have issued since
  const d = new Date(), day = dayKey(d), ini = initials(name);
  const no = `PSL-${day}-${ini}-${pad(seqFor(day, ini), 2)}`;
  registry.push({
    no, day, ini,
    project: name,
    city: city || "",
    scope: SCOPES[scopeKey].wm,
    volt: scopeKey === "turnkey" ? voltKey : "",
    total: total || 0,
    user: user || "Unassigned",
    ts: d.toISOString()
  });
  await saveRegistry();
  return no;
}

/* Optional adders. Each is off until added, and can be removed per quote.
   Sales tax is a rate applied to the line-item subtotal; shipping and bonding
   are flat amounts. Tax is not charged on bonding — bonding is a surety
   premium, not a taxable sale of goods. */
let adders = {
  tax:      {on:false, rate:"", label:"Sales tax"},
  shipping: {on:false, amt:"",  label:"Shipping"},
  bonding:  {on:false, amt:"",  label:"Bonding"}
};

const rate = s => { const n = parseFloat(String(s).replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; };
function calc(){
  const sub = lines.reduce((a,l)=>a+money(l.v),0);
  const ship = adders.shipping.on ? money(adders.shipping.amt) : 0;
  const bond = adders.bonding.on  ? money(adders.bonding.amt)  : 0;
  const taxable = sub + ship;                      // goods + freight
  const tax = adders.tax.on ? taxable * (rate(adders.tax.rate)/100) : 0;
  return {sub, ship, bond, tax, total: sub + ship + bond + tax};
}

const money = s => {
  const num = parseFloat(String(s).replace(/[^0-9.\-]/g,""));
  return isNaN(num) ? 0 : num;
};
const fmt = n => "$" + n.toLocaleString("en-US",{minimumFractionDigits:2, maximumFractionDigits:2});

function ed(html, ph, cls){
  return `<span class="${cls||''}" contenteditable="true" data-ph="${ph}">${html||""}</span>`;
}
function listHTML(items, cls){
  return `<ul class="slist ${cls||''}">` + items.map(t=>{
    const sub = t.startsWith(">");
    return `<li class="${sub?'sub':''}"><span contenteditable="true">${sub?t.slice(1):t}</span><button class="kill" title="Remove" aria-label="Remove item">×</button></li>`;
  }).join("") + `</ul>`;
}

/* The exclusions note has to agree with the lines actually on the quote —
   a quote that lists sales tax cannot also say sales tax is excluded. */
/* Update the computed cells in place. Re-rendering the whole document on every
   blur destroys whatever the user just clicked — including the × they were
   aiming at — so structural changes rebuild, edits only patch. */
function refreshTotals(){
  const C = calc();
  const sub = document.getElementById('cellSub');
  const tax = document.getElementById('cellTax');
  const tot = document.getElementById('cellTot');
  if(sub) sub.textContent = fmt(C.sub);
  if(tax) tax.textContent = fmt(C.tax);
  if(tot) tot.innerHTML = C.total>0 ? fmt(C.total) : '<span style="color:#c2cbd3">$0.00</span>';
  const note = document.getElementById('pricenote');
  if(note) note.textContent = noteText();
}

function noteText(){
  const out = [];
  if(!adders.tax.on) out.push("Sales tax");
  out.push("permitting");
  if(!adders.bonding.on) out.push("bonding");
  const excl = out.length
    ? out.join(", ").replace(/, ([^,]*)$/, " and $1") + (out.length>1 ? " are" : " is") + " not included. "
    : "";
  const inc = [];
  if(adders.tax.on) inc.push("sales tax");
  if(adders.shipping.on) inc.push("shipping");
  if(adders.bonding.on) inc.push("bonding");
  const incl = inc.length ? "Quoted total includes " + inc.join(", ").replace(/, ([^,]*)$/, " and $1") + ". " : "";
  return (excl.charAt(0).toUpperCase() + excl.slice(1)) + incl + "Quote is confidential. Pricing and lead times are effective for 30 days from the date above.";
}

function wire(){

     line, switching scope) rebuilds the markup empty and silently discards
     whatever was typed. */
  [["projname","projName"],["projcity","projCity"],["projdate","projDate"]].forEach(([id,key])=>{
    const el = document.getElementById(id);
    if(!el) return;
    const sync = ()=>{ const v = el.textContent.trim();
      if(key==="projName") projName = v; else if(key==="projCity") projCity = v; else projDate = v; };
    el.addEventListener('input', sync);
    el.addEventListener('blur', sync);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });
  // price line edits -> keep model in sync, recompute total on blur
  document.querySelectorAll('[data-line]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const i = +el.dataset.line, k = el.dataset.k;
      lines[i][k] = el.textContent.trim();
      if(k==='v'){
        const n = money(lines[i].v);
        if(n>0){ lines[i].v = fmt(n); el.textContent = lines[i].v; }
        refreshTotals();
      }
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });
  document.querySelectorAll('[data-add]').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const k = el.dataset.add, f = el.dataset.k;
      const v = el.textContent.trim();
      if(f === 'amt'){ const n = money(v); adders[k].amt = n>0 ? fmt(n) : ""; el.textContent = adders[k].amt; }
      else           { const n = rate(v);  adders[k].rate = n>0 ? String(n) : ""; el.textContent = adders[k].rate; }
      refreshTotals();
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });
  document.querySelectorAll('[data-rmadd]').forEach(b=>{
    b.addEventListener('mousedown', e=>{
      e.preventDefault();                       // fire before blur rebuilds anything
      const k=b.dataset.rmadd;
      adders[k].on=false;
      if(k==='tax') adders.tax.rate=""; else adders[k].amt="";
      render();
    });
  });
  document.querySelectorAll('[data-addadd]').forEach(b=>{
    b.addEventListener('mousedown', e=>{
      e.preventDefault();
      const k=b.dataset.addadd;
      adders[k].on=true;
      render();
      const el=document.querySelector(`[data-add="${k}"]`); if(el) el.focus();
    });
  });
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('mousedown', e=>{
      e.preventDefault();
      const i = +b.dataset.del;
      const el = document.querySelector(`[data-line="${i}"][data-k="v"]`);
      if(el) lines[i].v = el.textContent.trim();   // keep any in-flight edit
      lines.splice(i,1);
      if(!lines.length) lines.push({n:"",v:""});
      render();
    });
  });
  document.querySelectorAll('.kill:not([data-del])').forEach(b=>{
    b.onclick = ()=> b.closest('li').remove();
  });
  document.querySelectorAll('[data-addto]').forEach(b=>{
    b.onclick = ()=>{
      const ul = b.previousElementSibling;
      const li = document.createElement('li');
      li.innerHTML = `<span contenteditable="true" data-ph="New line">&nbsp;</span><button class="kill" title="Remove" aria-label="Remove item">×</button>`;
      ul.appendChild(li);
      li.querySelector('.kill').onclick = ()=> li.remove();
      li.querySelector('span').focus();
    };
  });
  const add2 = document.getElementById('addline2');
  if(add2) add2.onclick = addLine;
}
function addLine(){ lines.push({n:"",v:""}); render(); }

document.querySelectorAll('[data-scope]').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('[data-scope]').forEach(x=>x.setAttribute('aria-pressed', x===b));
    scope = b.dataset.scope;
    syncVolt();
    render();
  };
});
document.querySelectorAll('[data-view]').forEach(b=>{
  b.onclick = async ()=>{
    document.querySelectorAll('[data-view]').forEach(x=>x.setAttribute('aria-pressed', x===b));
    view = b.dataset.view;
    if(view === 'log'){ await loadRegistry(); }
    syncChrome();
    render();
  };
});

/* Identity, not authentication. This names who issued a quote; it does not
   protect anything. Real access control needs a server.
   NOTE: no prompt()/alert() — sandboxed frames block modal dialogs, which left
   the user unable to type a name at all. A plain input always works. */
function paintUser(){
  const el = document.getElementById('whoami');
  if(el && el.value !== user) el.value = user || "";
}
async function saveUser(){ await store.set("psl:user", user); }
async function restoreUser(){ const v = await store.get("psl:user"); if(v) user = v; paintUser(); }
(function wireUser(){
  const el = document.getElementById('whoami');
  el.addEventListener('input', ()=>{
    user = el.value.trim();
    el.classList.remove('need');
  });
  el.addEventListener('change', saveUser);
  el.addEventListener('blur', saveUser);
})();

function syncChrome(){
  const build = view === 'build';
  document.querySelectorAll('[data-scope]').forEach(b=> b.parentElement.style.display = build ? 'flex' : 'none');
  document.getElementById('addline').style.display = build ? '' : 'none';
  document.getElementById('newquote').style.display = build ? '' : 'none';
  document.getElementById('print').style.display = build ? '' : 'none';
  syncVolt();
}
function syncVolt(){
  const seg = document.getElementById('voltseg');
  const on = scope === 'turnkey' && view === 'build';
  seg.style.display = on ? 'flex' : 'none';   // electrical is turnkey-only scope
  seg.setAttribute('aria-hidden', String(!on));
}
document.querySelectorAll('[data-volt]').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('[data-volt]').forEach(x=>x.setAttribute('aria-pressed', x===b));
    volt = b.dataset.volt;
    render();
  };
});
document.getElementById('addline').onclick = addLine;
document.getElementById('print').onclick = async ()=>{
  const btn = document.getElementById('print');
  const pn = document.getElementById('projname');
  if(pn) projName = pn.textContent.trim();
  const pc = document.getElementById('projcity');
  if(pc) projCity = pc.textContent.trim();
  const pd = document.getElementById('projdate');
  if(pd) projDate = pd.textContent.trim();

  if(!quoteNo && !projName){
    document.getElementById('hint').textContent = "Enter a project name first \u2014 the quote number is built from it";
    if(pn) pn.focus();
    return;
  }
  if(!quoteNo && !user){
    const who = document.getElementById('whoami');
    who.classList.add('need');
    who.focus();
    document.getElementById('hint').textContent = "Add your name in the toolbar \u2014 every issued quote is logged against a person";
    return;
  }
  if(!quoteNo){
    btn.disabled = true;
    const total = calc().total;
    quoteNo = await issueQuote(projName, projCity, scope, volt, total);
    render();
    document.getElementById('hint').textContent = quoteNo + " issued and logged \u00b7 \u201cNew quote\u201d starts the next one";
    btn.disabled = false;
    await new Promise(r=>setTimeout(r,80));   // let the new number paint before capture
  }
  await downloadPDF();
};

/* Write the PDF straight to disk, named for the quote. No print dialog.

   Two things this has to get right, both of which the convenience wrappers get
   wrong by default:
     1. html2canvas captures from the current scroll offset unless told otherwise,
        which lands half a page in the PDF. Pin the scroll to the sheet's top.
     2. The sheet is 8.5in = 816 CSS px. Force that width at capture time and map
        it to the page width explicitly, rather than letting the canvas size float
        with whatever the viewport happens to be. */
const PX_PER_IN = 96, SHEET_W = 8.5 * PX_PER_IN;   // 816

async function downloadPDF(){
  const sheet = document.querySelector('.sheet');
  const btn = document.getElementById('print');
  const hint = document.getElementById('hint');
  if(!sheet) return;

  if(typeof html2canvas === 'undefined' || !window.jspdf){
    hint.textContent = "PDF library unavailable \u2014 falling back to the print dialog";
    window.print();
    return;
  }

  const label = btn.textContent;
  btn.disabled = true; btn.textContent = 'Building PDF\u2026';
  document.body.classList.add('exporting');

  const scrollY = window.scrollY, scrollX = window.scrollX;
  window.scrollTo(0,0);                       // capture from a known origin

  try{
    if(document.fonts && document.fonts.ready) await document.fonts.ready;
    await new Promise(r=>setTimeout(r,60));   // let layout settle after chrome is hidden

    const canvas = await html2canvas(sheet, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      scrollX: 0,
      scrollY: 0,
      windowWidth: SHEET_W,
      width: SHEET_W,
      height: sheet.scrollHeight
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:'pt', format:'letter', orientation:'portrait'});
    const pw = pdf.internal.pageSize.getWidth();    // 612
    const ph = pdf.internal.pageSize.getHeight();   // 792
    const img = canvas.toDataURL('image/jpeg', 0.98);

    const imgW = pw;
    const imgH = canvas.height * (pw / canvas.width);   // preserve aspect

    let y = 0, page = 0;
    while(y < imgH - 1){
      if(page) pdf.addPage();
      pdf.addImage(img, 'JPEG', 0, -y, imgW, imgH);    // shift up to expose the next slice
      y += ph; page++;
      if(page > 12) break;                             // guard
    }
    pdf.save((quoteNo || 'PSL-quote') + '.pdf');
    hint.textContent = (quoteNo || 'Quote') + '.pdf downloaded \u00b7 logged \u00b7 "New quote" starts the next one';
  }catch(err){
    hint.textContent = 'PDF export failed \u2014 opening the print dialog instead';
    window.print();
  }finally{
    document.body.classList.remove('exporting');
    window.scrollTo(scrollX, scrollY);
    btn.disabled = false; btn.textContent = label;
  }
}
document.getElementById('newquote').onclick = ()=>{
  quoteNo = null;
  projName = "";
  projCity = "";
  projDate = todayStr();
  lines = [{n:"",v:""},{n:"",v:""},{n:"",v:""}];
  adders = {tax:{on:false,rate:"",label:"Sales tax"}, shipping:{on:false,amt:"",label:"Shipping"}, bonding:{on:false,amt:"",label:"Bonding"}};
  document.getElementById('hint').textContent = "Click any text to edit \u00b7 quote number is assigned on download";
  render();
};

(async function boot(){
  projDate = todayStr();
  await restoreUser();
  await loadRegistry();
  syncChrome();
  render();
})();
</script>
